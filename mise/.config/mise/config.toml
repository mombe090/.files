# Mise Configuration for Dotfiles
# Documentation: https://mise.jdx.dev/configuration.html

[settings]
experimental = true
verbose = false
yes = false

# configure `mise install` to always keep the downloaded archive
always_keep_download = false        # deleted after install by default
always_keep_install = false         # deleted on failure by default

env_file = '.env'

trusted_config_paths = [
    '~/.config/mise',
]

# ===== LANGUAGE RUNTIMES =====
[tools]
# Node.js ecosystem
"node" = "lts"
"bun" = "latest"

# Python
"python" = "latest"

# Go
"go" = "latest"

# Rust
"rust" = "latest"

# Ruby
"ruby" = "latest"

# ===== CLI TOOLS =====
# Modern replacements
"aqua:sharkdp/bat" = "latest"          # cat replacement
"eza" = "latest"          # ls replacement
"aqua:sharkdp/fd" = "latest"           # find replacement
"aqua:pre-commit/pre-commit" = "latest"   # pre-commit hooks manager
"aqua:BurntSushi/ripgrep" = "latest"      # grep replacement
"aqua:junegunn/fzf" = "latest"          # fuzzy finder
"aqua:ajeetdsouza/zoxide" = "latest"       # smart cd

# Shell enhancements
"aqua:starship/starship" = "latest"     # shell prompt
"aqua:direnv/direnv" = "latest"       # environment switcher

# Terminal multiplexers
#"zellij" = "latest"       # modern multiplexer
