# System tools
#"btop" = "latest"         # system monitor not supported on ARM yet
"aqua:jqlang/jq" = "latest"           # JSON processor
"aqua:mikefarah/yq" = "latest"           # YAML processor
"yamllint" = "latest"     # YAML linter

# ===== DEVOPS & CLOUD TOOLS =====
